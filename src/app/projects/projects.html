 <section id="projects" class="py-20 md:py-28 px-6 md:px-10 lg:px-14 max-w-7xl mx-auto relative lumon-section mt-10">
      <div class="flex flex-col md:flex-row md:items-end justify-between mb-16 gap-6 border-b border-lumon-700/70 pb-6">
        <div>
          <h2 class="font-display text-4xl md:text-5xl font-bold text-lumon-100 mb-2 uppercase tracking-tighter">
            PROJECTS
          </h2>
          <p class="font-mono text-sm text-lumon-400 font-bold uppercase tracking-widest opacity-90">
            Current Refinement: Coffee Fund Me
          </p>
        </div>
        <div class="px-4 py-2 border border-lumon-600/70 rounded bg-lumon-800/70 backdrop-blur-sm">
          <span class="font-mono text-xs font-bold text-green-300 uppercase">Status: Clear</span>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div *ngFor="let project of projects; let i = index" 
             class="group flex flex-col bg-lumon-800/60 backdrop-blur-sm border border-lumon-600/70 rounded-sm overflow-hidden shadow-[0_12px_32px_-18px_rgba(0,0,0,0.8)] hover:border-lumon-400/70 transition-all duration-300">
          
           <div class="border-b border-lumon-600/70 p-2 flex justify-between items-center bg-lumon-900/70">
             <span class="font-mono text-lg font-bold text-lumon-200">0{{i + 1}}</span>
             <i data-lucide="database" class="w-4 h-4 text-lumon-400 opacity-80"></i>
          </div>

           <div class="relative aspect-video overflow-hidden border-b border-lumon-700/70 bg-lumon-900/90">
            <img
              [src]="project.image"
              [alt]="project.title + ' project preview'"
              class="h-full w-full object-cover opacity-90 transition-transform duration-500 group-hover:scale-[1.02]"
            />
            <div class="absolute inset-0 bg-linear-to-t from-lumon-900/55 via-transparent to-transparent"></div>
          </div>

          <div class="relative flex-1 p-6 flex flex-col min-h-420px">
            <div class="absolute inset-0 z-0 flex items-center justify-center opacity-30 group-hover:opacity-60 transition-opacity">
              <svg class="w-full h-full" viewBox="0 0 200 200">
                <defs>
                  <radialGradient [id]="'grad-' + i" cx="50%" cy="50%" r="50%">
                    <stop id="animatedStop" offset="0%" />
                    <stop offset="100%" stop-color="transparent" />
                  </radialGradient>
                </defs>
                <circle id="bounce" cx="100" cy="80" r="40" [attr.fill]="'url(#grad-' + i + ')'" />
                <circle id="bounce2" cx="100" cy="80" r="25" [attr.fill]="'url(#grad-' + i + ')'" />
                <g id="particles" fill="white" fill-opacity="0.4">
                  <circle cx="80" cy="120" r="2" />
                  <circle cx="120" cy="110" r="1" />
                  <circle cx="100" cy="130" r="1.5" />
                </g>
              </svg>
            </div>

            <div class="relative z-10 flex flex-col h-full">
              <div class="mb-4">
                <h3 class="font-display text-2xl font-bold text-lumon-100 leading-none group-hover:text-white transition-colors">
                  {{project.title}}
                </h3>
                <p class="font-mono text-[10px] uppercase font-bold text-lumon-400 mt-2 opacity-90">
                  {{project.category}}
                </p>
              </div>

              <div class="flex-1 space-y-4">
                <div class="p-3 bg-lumon-900/55 border border-lumon-700/70 rounded-sm">
                  <h4 class="font-mono text-[9px] font-bold text-lumon-400 uppercase tracking-widest mb-1 opacity-90">Refinement Log</h4>
                  <p class="text-sm font-medium text-lumon-300 line-clamp-4">{{project.description}}</p>
                </div>
                
                <div class="flex flex-wrap gap-1">
                  <span *ngFor="let tech of project.stack" 
                        class="px-1.5 py-0.5 border border-lumon-600/80 font-mono text-[9px] font-bold text-lumon-200 bg-lumon-900/55 uppercase">
                    {{tech}}
                  </span>
                </div>
              </div>

              <div class="mt-8 flex gap-4 border-t border-lumon-700/70 pt-4">
                <a *ngIf="project.link" [href]="project.link" class="flex items-center gap-1 text-[10px] font-mono font-bold uppercase text-lumon-300 hover:text-white transition-colors">
                  [ LAUNCH ] <i data-lucide="arrow-up-right" class="w-3 h-3"></i>
                </a>
                <a *ngIf="project.github" [href]="project.github" class="flex items-center gap-1 text-[10px] font-mono font-bold uppercase text-lumon-500 hover:text-lumon-200 transition-colors">
                  [ SOURCE ] <i data-lucide="github" class="w-3 h-3"></i>
                </a>
              </div>
            </div>
          </div>

          <!-- Refinement level -->
          <div class="border-t border-lumon-600/70 bg-lumon-900/65 p-3">
             <div class="flex justify-between items-center mb-1">
               <span class="font-mono text-[10px] font-bold text-lumon-300 uppercase">Refinement Level</span>
               <span class="font-mono text-[10px] font-bold text-lumon-300">{{project.level}}%</span>
             </div>
             <div class="h-5 border border-lumon-600/70 p-0.5 relative overflow-hidden">
                <div class="h-full bg-lumon-500/80 transition-all duration-1000" 
                     [style.width.%]="project.level"></div>
                <div class="absolute inset-0 monitor-scanline opacity-50"></div>
             </div>
          </div>
        </div>
      </div>

      <div class="mt-12 text-center italic font-sans text-xs text-lumon-500 font-medium">
        More projects underway... Stay tuned!
      </div>
    </section>
